    function openSpotModal(mdPath, img, title, en) {
      var data = spotsData[mdPath];
      var body = document.getElementById('modalBody');

      document.getElementById('modalHero').style.backgroundImage = "url('" + img + "')";
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalEn').textContent = en;
      document.getElementById('spotModalOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';

      if (data && data.md) {
        var html = window.marked ? window.marked.parse(data.md) : '<pre>' + data.md + '</pre>';
        body.innerHTML = html + '<a class="spot-modal-link" href="#/' + mdPath + '">查看完整頁面 →</a>';
      } else {
        body.innerHTML = '<p style="color:#aaa">尚無內容</p>';
      }
    }

    function closeModal() {
      document.getElementById('spotModalOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    function closeSpotModal(e) {
      if (e.target === document.getElementById('spotModalOverlay')) closeModal();
    }

    document.addEventListener('keydown', function(e){ if (e.key === 'Escape') { closeModal(); closeContactModal(); } });

    /* ── Contact ── */
    var FORMSPREE_ENDPOINT = 'https://formspree.io/f/xlgwqlzg'; // ← 替換成你的 endpoint

    function openContactModal() {
      document.getElementById('contactForm').style.display = 'block';
      document.getElementById('contactSuccess').style.display = 'none';
      document.getElementById('contactName').value = '';
      document.getElementById('contactEmail').value = '';
      document.getElementById('contactMessage').value = '';
      document.getElementById('contactSubmitBtn').disabled = false;
      document.getElementById('contactSubmitBtn').textContent = '送出';
      document.getElementById('contactOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeContactModal(e) {
      if (!e || e.target === document.getElementById('contactOverlay')) {
        document.getElementById('contactOverlay').classList.remove('active');
        document.body.style.overflow = '';
      }
    }

    function submitContact() {
      var message = document.getElementById('contactMessage').value.trim();
      if (!message) {
        document.getElementById('contactMessage').focus();
        document.getElementById('contactMessage').style.borderColor = '#e63946';
        return;
      }
      var btn = document.getElementById('contactSubmitBtn');
      btn.disabled = true;
      btn.textContent = '送出中...';

      var data = {
        name: document.getElementById('contactName').value,
        email: document.getElementById('contactEmail').value,
        message: message
      };

      fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (res.ok || res.next) {
          document.getElementById('contactForm').style.display = 'none';
          document.getElementById('contactSuccess').style.display = 'block';
        } else {
          btn.disabled = false;
          btn.textContent = '送出失敗，請再試一次';
        }
      })
      .catch(function() {
        btn.disabled = false;
        btn.textContent = '送出失敗，請再試一次';
      });
    }
  </script>
</body>
</html>
