<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Knowledge Base</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KB">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Android / general -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="KB">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== FIRST RUN SETUP ===== -->
  <div id="setupScreen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-icon">📚</div>
        <h1>初次設定</h1>
        <p>建立您的管理員帳號</p>
      </div>
      <form id="setupForm">
        <div class="field">
          <label for="setupUsername">使用者名稱</label>
          <input type="text" id="setupUsername" autocomplete="username" placeholder="輸入帳號" required>
        </div>
        <div class="field">
          <label for="setupDisplayName">顯示名稱（可選）</label>
          <input type="text" id="setupDisplayName" autocomplete="name" placeholder="您的名字">
        </div>
        <div class="field">
          <label for="setupPassword">密碼</label>
          <input type="password" id="setupPassword" autocomplete="new-password" placeholder="至少 4 個字元" required>
        </div>
        <div class="field">
          <label for="setupPassword2">確認密碼</label>
          <input type="password" id="setupPassword2" autocomplete="new-password" placeholder="再次輸入密碼" required>
        </div>
        <button type="submit" class="login-btn">建立帳號並開始使用</button>
        <p class="login-error" id="setupError"></p>
      </form>
    </div>
  </div>

  <!-- ===== LOGIN ===== -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-icon">📚</div>
        <h1>Knowledge Base</h1>
        <p>私人知識庫</p>
      </div>
      <form id="loginForm">
        <div class="field">
          <label for="loginUsername">使用者名稱</label>
          <input type="text" id="loginUsername" autocomplete="username" placeholder="輸入帳號" required>
        </div>
        <div class="field">
          <label for="loginPassword">密碼</label>
          <input type="password" id="loginPassword" autocomplete="current-password" placeholder="輸入密碼" required>
        </div>
        <button type="submit" class="login-btn" id="loginSubmitBtn">登入</button>
        <p class="login-error" id="loginError"></p>
      </form>
    </div>
  </div>

  <!-- ===== MAIN APP ===== -->
  <div id="app" class="app hidden">

    <!-- Sidebar backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-icon">📚</span>
        <span class="sidebar-title">Knowledge Base</span>
      </div>

      <div class="sidebar-search-hint" id="sidebarSearchHint">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        搜尋筆記
        <span class="sidebar-search-kbds"><kbd>Ctrl</kbd><kbd>K</kbd></span>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">標籤</div>
        <div id="tagList" class="tag-list"></div>
      </div>

      <div class="sidebar-note-section">
        <div class="sidebar-section-title-row">
          <span class="sidebar-section-title">筆記</span>
          <button class="sidebar-new-btn" id="sidebarNewBtn" title="新增筆記">＋</button>
        </div>
        <div id="noteList" class="note-list"></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- View mode topbar -->
      <header class="topbar" id="viewTopbar">
        <button class="hamburger-btn" id="sidebarToggleBtn" title="選單" aria-label="開關側邊欄">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <button class="search-trigger-btn" id="searchTriggerBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          搜尋筆記...
          <span class="kbd-group"><kbd>Ctrl</kbd><kbd>K</kbd></span>
        </button>
        <div class="topbar-right">
          <button class="topbar-icon-btn" id="newNoteBtn" title="新增筆記">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            新增
          </button>
          <button class="edit-btn hidden" id="editNoteBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            編輯
          </button>
          <button class="delete-btn hidden" id="deleteNoteBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            刪除
          </button>
          <span class="user-badge" id="currentUser"></span>
          <button class="topbar-icon-btn settings-btn" id="settingsBtn" title="設定">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button class="logout-btn" id="logoutBtn">登出</button>
        </div>
      </header>

      <!-- Edit mode topbar -->
      <header class="topbar topbar-edit hidden" id="editTopbar">
        <div class="edit-topbar-left">
          <button class="topbar-back-btn" id="cancelEditBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            取消
          </button>
          <span class="edit-note-name" id="editNoteNameLabel"></span>
        </div>
        <div class="edit-topbar-right">
          <span class="save-status" id="saveStatus"></span>
          <button class="save-btn" id="saveNoteBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            儲存
          </button>
        </div>
      </header>

      <!-- View area -->
      <div id="noteContent" class="note-content">
        <div class="welcome">
          <div class="welcome-icon">🔍</div>
          <h2>歡迎使用 Knowledge Base</h2>
          <p>按 <kbd>Ctrl+K</kbd> 或 <kbd>/</kbd> 開始搜尋<br>或從左側選擇筆記</p>
        </div>
      </div>


    </main>
  </div>

  <!-- ===== SEARCH OVERLAY ===== -->
  <div id="searchOverlay" class="search-overlay hidden">
    <div class="search-dialog">
      <div class="search-input-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="搜尋筆記..." autocomplete="off" spellcheck="false">
        <span class="search-esc-hint">Esc</span>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>

  <!-- CDN -->
  <script src="//cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body> 
</html>
